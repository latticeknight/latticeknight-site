# Trusted commands run by the local validation gate from the default branch.
# The audit flags mirror CI; `.github/workflows/ci.yml` documents why `--omit=optional` is set
# and when it can be dropped.
commands:
  test: "npm ci && npm run typecheck && npm run build && npm audit --omit=dev --omit=optional --audit-level=high"
  lint: "npm ci && npm run lint"
