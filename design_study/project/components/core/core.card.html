<!-- @dsCard group="Components" viewport="700x430" subtitle="Kicker, StatusDot, Button, Panel, Chip, FlipCard" name="Core" -->
<link rel="stylesheet" href="../../styles.css"><style>body{margin:0;background:var(--bg-1);color:var(--text-1);font-family:var(--font-display);padding:20px;display:flex;flex-direction:column;gap:16px}.mono{font-family:var(--font-mono);text-transform:uppercase}.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}</style>
<div class="row">
  <span class="mono" style="font-size:11px;letter-spacing:var(--track-kicker);color:var(--cyan)">THE LATTICE</span>
  <span class="mono" style="font-size:10px;letter-spacing:var(--track-label);color:var(--text-3)">SECTION LABEL</span>
  <span class="mono" style="font-size:10px;letter-spacing:var(--track-label);color:var(--amber)">WHERE AGENTS FAIL</span>
</div>
<div class="row">
  <span style="display:flex;align-items:center;gap:9px"><span style="width:7px;height:7px;border-radius:50%;background:var(--cyan)"></span><span class="mono" style="font-size:10px;letter-spacing:.24em;color:var(--cyan)">LIVE</span></span>
  <span style="display:flex;align-items:center;gap:9px"><span style="width:7px;height:7px;border-radius:50%;background:var(--amber)"></span><span class="mono" style="font-size:10px;letter-spacing:.24em;color:var(--amber)">PRE-LAUNCH</span></span>
  <span style="display:flex;align-items:center;gap:9px"><span style="width:7px;height:7px;border-radius:50%;border:1px solid var(--text-4)"></span><span class="mono" style="font-size:10px;letter-spacing:.24em;color:var(--text-4)">PLANNED</span></span>
</div>
<div class="row">
  <a style="padding:12px 22px;border:1px solid var(--border-cyan);border-radius:var(--radius-sm);color:var(--cyan);font-size:13.5px;letter-spacing:.03em;text-decoration:none">Explore the systems</a>
  <a style="padding:12px 22px;border:1px solid var(--border-3);border-radius:var(--radius-sm);color:var(--text-2);font-size:13.5px;letter-spacing:.03em;text-decoration:none">See the workflows</a>
  <span class="mono" style="border:1px solid var(--border-3);color:var(--text-3);font-size:10px;letter-spacing:.16em;padding:8px 12px;border-radius:var(--radius-sm)">MAP</span>
  <span class="mono" style="font-size:10px;letter-spacing:var(--track-chip);padding:7px 12px;border:1px solid var(--border-2);border-radius:var(--radius-sm);color:var(--text-3)">AI ECONOMICS</span>
  <span class="mono" style="font-size:11px;letter-spacing:.08em;padding:9px 13px;border:1px solid var(--border-cyan-strong);border-radius:var(--radius-sm);color:var(--cyan-bright);background:rgba(142,196,214,.12)">ARCHITECTURE</span>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
  <div style="background:var(--surface-1);border:1px solid var(--border-1);border-radius:var(--radius-lg);padding:16px;backdrop-filter:var(--blur-panel)"><div style="font-size:14px;font-weight:600;margin-bottom:6px">Panel</div><div style="font-size:12px;color:var(--text-3);line-height:1.6">Translucent graphite, 1px border, blur. No shadows.</div></div>
  <div style="background:rgba(15,18,24,.92);border:1px solid var(--border-amber);border-radius:var(--radius-md);padding:16px 16px 30px;position:relative"><div style="display:flex;align-items:center;gap:9px;margin-bottom:7px"><span style="width:14px;height:1px;background:var(--amber)"></span><span style="font-size:13px;font-weight:600">FlipCard front</span></div><div style="font-size:12px;color:var(--text-3);line-height:1.6">Problem statement.</div><span class="mono" style="position:absolute;bottom:8px;right:12px;font-size:17px;color:var(--amber);opacity:.8">⟲</span></div>
  <div style="background:rgba(15,22,28,.96);border:1px solid rgba(142,196,214,.28);border-radius:var(--radius-md);padding:16px 16px 30px;position:relative"><div class="mono" style="font-size:9.5px;letter-spacing:.2em;color:var(--cyan);margin-bottom:8px">MITIGATION</div><div style="font-size:12px;color:var(--text-2);line-height:1.6">Counter-measure on the back.</div><span class="mono" style="position:absolute;bottom:8px;right:12px;font-size:17px;color:var(--cyan);opacity:.8">⟲</span></div>
</div>
