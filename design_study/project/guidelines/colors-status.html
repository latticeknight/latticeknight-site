<!-- @dsCard group="Colors" viewport="700x120" subtitle="Status is structural: dot + mono label, never badge pills" name="Status vocabulary" -->
<link rel="stylesheet" href="../styles.css"><style>body{margin:0;background:var(--bg-1);color:var(--text-1);font-family:var(--font-display);padding:20px}.mono{font-family:var(--font-mono);text-transform:uppercase}</style><div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center;border:1px solid var(--border-1);border-radius:6px;padding:18px 20px;background:var(--surface-3)">
<span style="display:flex;align-items:center;gap:7px"><span style="width:7px;height:7px;border-radius:50%;background:var(--status-live)"></span><span class="mono" style="font-size:10px;letter-spacing:.2em;color:var(--text-3)">LIVE</span></span><span style="display:flex;align-items:center;gap:7px"><span style="width:7px;height:7px;border-radius:50%;background:var(--status-dev)"></span><span class="mono" style="font-size:10px;letter-spacing:.2em;color:var(--text-3)">IN DEVELOPMENT</span></span><span style="display:flex;align-items:center;gap:7px"><span style="width:7px;height:7px;border-radius:50%;background:var(--status-experimental)"></span><span class="mono" style="font-size:10px;letter-spacing:.2em;color:var(--text-3)">EXPERIMENTAL</span></span><span style="display:flex;align-items:center;gap:7px"><span style="width:7px;height:7px;border-radius:50%;border:1px solid var(--text-4)"></span><span class="mono" style="font-size:10px;letter-spacing:.2em;color:var(--text-3)">PLANNED</span></span>
<span style="display:flex;align-items:center;gap:7px;opacity:.6"><span style="width:7px;height:7px;border-radius:50%;background:var(--text-5)"></span><span class="mono" style="font-size:10px;letter-spacing:.2em;color:var(--text-4);text-decoration:line-through;text-transform:none">DISCARDED</span></span>
</div>
