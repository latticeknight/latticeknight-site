name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      # `--omit=optional` drops Next.js' optional `sharp` dependency, which only backs
      # self-hosted image optimization. This site deploys on Vercel, where images are
      # optimized by the platform rather than by `node_modules/sharp`.
      # Remove the flag once Next.js ships a release that requires sharp >= 0.35.0
      # (GHSA-f88m-g3jw-g9cj).
      - name: Audit production dependencies
        run: npm audit --omit=dev --omit=optional --audit-level=high
